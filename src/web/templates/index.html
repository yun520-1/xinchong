<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心虫 — Xinchong AI</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --user-bg: #1c2128;
            --user-border: #388bfd33;
            --assistant-bg: #0d1117;
            --heartflow-color: #f0883e;
            --emotion-color: #a371f7;
            --consciousness-color: #3fb950;
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo {
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }
        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .logo-sub {
            font-size: 12px;
            color: var(--text-muted);
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }
        .status-dot.offline { background: var(--danger); }
        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:hover { background: var(--border); }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        /* Main Layout */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        .new-chat-btn {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px dashed var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s;
        }
        .new-chat-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .session-item {
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 2px;
            transition: background 0.1s;
        }
        .session-item:hover { background: var(--bg-tertiary); }
        .session-item.active { background: var(--user-bg); border: 1px solid var(--user-border); }
        .session-title {
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .session-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border);
        }
        .provider-selector {
            width: 100%;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 12px;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            max-width: 800px;
            margin: 0 auto 20px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-user {
            display: flex;
            justify-content: flex-end;
        }
        .message-user .message-content {
            background: var(--user-bg);
            border: 1px solid var(--user-border);
            border-radius: 12px 12px 2px 12px;
            padding: 10px 14px;
            max-width: 70%;
        }
        .message-assistant {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--heartflow-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .message-content {
            padding: 10px 14px;
            border-radius: 12px 12px 12px 2px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            font-size: 14px;
            line-height: 1.7;
        }
        .message-content pre {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
            margin: 8px 0;
        }
        .message-content code {
            font-family: "SF Mono", Consolas, monospace;
            background: var(--bg-tertiary);
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 13px;
        }
        .message-timestamp {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: right;
        }

        /* Cognitive Panel */
        .cognitive-panel {
            max-width: 800px;
            margin: 0 auto 20px;
            display: none;
        }
        .cognitive-panel.visible { display: block; }
        .cognitive-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--heartflow-color);
            background: transparent;
            color: var(--heartflow-color);
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .cognitive-toggle:hover { background: #f0883e15; }
        .cognitive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px;
        }
        .cognitive-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
        }
        .cognitive-card-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .cognitive-card-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .cognitive-bar {
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        .cognitive-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        .tgb-bar { background: var(--heartflow-color); }
        .emotion-bar { background: var(--emotion-color); }
        .consciousness-bar { background: var(--consciousness-color); }

        /* Input Area */
        .input-area {
            padding: 12px 20px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }
        .chat-input {
            width: 100%;
            padding: 12px 50px 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 48px;
            max-height: 200px;
            outline: none;
            transition: border-color 0.15s;
        }
        .chat-input:focus { border-color: var(--accent); }
        .chat-input::placeholder { color: var(--text-muted); }
        .send-btn {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.15s;
        }
        .send-btn:hover { background: var(--accent-hover); }
        .send-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

        /* Welcome Screen */
        .welcome {
            max-width: 600px;
            margin: 60px auto;
            text-align: center;
            padding: 0 20px;
        }
        .welcome-logo { font-size: 64px; margin-bottom: 20px; }
        .welcome h1 { font-size: 28px; margin-bottom: 8px; }
        .welcome p { color: var(--text-secondary); margin-bottom: 30px; line-height: 1.8; }
        .welcome-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            text-align: left;
        }
        .feature-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
        }
        .feature-icon { font-size: 20px; margin-bottom: 6px; }
        .feature-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .feature-desc { font-size: 12px; color: var(--text-secondary); }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 14px;
            align-items: center;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Crisis message */
        .crisis-message { border-color: var(--danger) !important; background: #f8514915 !important; }
        .cognitive-panel .cognitive-card.tgb-card { border-color: var(--heartflow-color); }
        .cognitive-panel .cognitive-card.emotion-card { border-color: var(--emotion-color); }
        .cognitive-panel .cognitive-card.consciousness-card { border-color: var(--consciousness-color); }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-left">
        <div class="logo">🐛</div>
        <div>
            <div class="logo-text">心虫 Xinchong</div>
            <div class="logo-sub">HeartFlow Cognitive Engine v10.4</div>
        </div>
    </div>
    <div class="header-right">
        <div class="status-badge">
            <div class="status-dot" id="apiStatus"></div>
            <span id="apiStatusText">API就绪</span>
        </div>
        <button class="btn" onclick="toggleCognitive()" id="cognitiveToggle">🧠 认知分析</button>
        <button class="btn" onclick="clearChat()">🗑️ 清空</button>
    </div>
</div>

<!-- Main -->
<div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newSession()">+ 新对话</button>
        </div>
        <div class="sessions-list" id="sessionsList">
            <!-- Sessions populated by JS -->
        </div>
        <div class="sidebar-footer">
            <select class="provider-selector" id="providerSelect" onchange="setProvider(this.value)">
                <option value="">加载中...</option>
            </select>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <div class="messages" id="messagesArea">
            <!-- Welcome or messages -->
        </div>

        <!-- Cognitive Panel -->
        <div class="cognitive-panel" id="cognitivePanel">
            <button class="cognitive-toggle" onclick="toggleCognitive()">🧠 认知分析</button>
            <div class="cognitive-grid">
                <div class="cognitive-card tgb-card">
                    <div class="cognitive-card-title">TGB 真善美</div>
                    <div class="cognitive-card-value" id="tgbVerdict">—</div>
                    <div class="cognitive-bar"><div class="cognitive-bar-fill tgb-bar" id="tgbBar" style="width:0%"></div></div>
                </div>
                <div class="cognitive-card emotion-card">
                    <div class="cognitive-card-title">情绪分析</div>
                    <div class="cognitive-card-value" id="emotionValue">—</div>
                    <div class="cognitive-bar"><div class="cognitive-bar-fill emotion-bar" id="emotionBar" style="width:0%"></div></div>
                </div>
                <div class="cognitive-card consciousness-card">
                    <div class="cognitive-card-title">意识状态</div>
                    <div class="cognitive-card-value" id="consciousnessValue">—</div>
                    <div class="cognitive-bar"><div class="cognitive-bar-fill consciousness-bar" id="consciousnessBar" style="width:0%"></div></div>
                </div>
                <div class="cognitive-card">
                    <div class="cognitive-card-title">成长阶段</div>
                    <div class="cognitive-card-value" id="selfLevelValue">—</div>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    class="chat-input"
                    id="chatInput"
                    placeholder="输入消息... (Shift+Enter 换行, Enter 发送)"
                    rows="1"
                    onkeydown="handleKeydown(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
// State
// ============================================================
let currentSessionId = "{{ session.id }}";
let showCognitive = false;
let isStreaming = false;
let selectedProvider = "";

// ============================================================
// Init
// ============================================================
document.addEventListener("DOMContentLoaded", async () => {
    loadSessions();
    loadMessages();
    loadStatus();
    document.getElementById("chatInput").focus();
});

async function loadStatus() {
    try {
        const r = await fetch("/api/status");
        const d = await r.json();
        const select = document.getElementById("providerSelect");
        select.innerHTML = "";
        if (d.providers && d.providers.length > 0) {
            d.providers.forEach(p => {
                const opt = document.createElement("option");
                opt.value = p;
                opt.text = p === d.default_provider ? `⭐ ${p} (默认)` : p;
                select.appendChild(opt);
            });
            selectedProvider = d.default_provider || d.providers[0];
            document.getElementById("apiStatus").className = "status-dot";
            document.getElementById("apiStatusText").textContent = `${d.providers.length} 个API就绪`;
        } else {
            select.innerHTML = '<option value="">未配置API</option>';
            document.getElementById("apiStatus").className = "status-dot offline";
            document.getElementById("apiStatusText").textContent = "API未配置";
        }
    } catch (e) {
        document.getElementById("apiStatus").className = "status-dot offline";
        document.getElementById("apiStatusText").textContent = "离线";
    }
}

async function loadSessions() {
    try {
        const r = await fetch("/api/sessions");
        const sessions = await r.json();
        const list = document.getElementById("sessionsList");
        list.innerHTML = "";
        sessions.forEach(s => {
            const div = document.createElement("div");
            div.className = "session-item" + (s.id === currentSessionId ? " active" : "");
            div.innerHTML = `
                <div class="session-title">${escapeHtml(s.title)}</div>
                <div class="session-meta">${formatDate(s.updated_at)} · ${s.message_count}条</div>
            `;
            div.onclick = () => switchSession(s.id);
            list.appendChild(div);
        });
    } catch (e) { console.error(e); }
}

async function loadMessages() {
    if (!currentSessionId) {
        showWelcome();
        return;
    }
    try {
        const r = await fetch(`/api/sessions/${currentSessionId}/messages`);
        const msgs = await r.json();
        const area = document.getElementById("messagesArea");
        if (msgs.length === 0) {
            showWelcome();
            return;
        }
        area.innerHTML = "";
        msgs.forEach(m => {
            if (m.role === "system") return;
            appendMessage(m.role, m.content, m.metadata);
        });
        scrollToBottom();
    } catch (e) {
        showWelcome();
    }
}

function showWelcome() {
    const area = document.getElementById("messagesArea");
    area.innerHTML = `
        <div class="welcome">
            <div class="welcome-logo">🐛</div>
            <h1>心虫 Xinchong</h1>
            <p>我是心虫，一个由 HeartFlow 认知引擎驱动的 AI 伴侣。<br>我能思考你的思考，感受你的感受，与你一起成长。</p>
            <div class="welcome-features">
                <div class="feature-card">
                    <div class="feature-icon">🧠</div>
                    <div class="feature-title">12 认知引擎</div>
                    <div class="feature-desc">决策、情感、意识、伦理、自我成长六大维度</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">💎</div>
                    <div class="feature-title">TGB 真善美</div>
                    <div class="feature-desc">真理·善良·美丽的辩证统一</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">❤️</div>
                    <div class="feature-title">情感智能</div>
                    <div class="feature-desc">PAD情绪模型，身体感觉记忆</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🌱</div>
                    <div class="feature-title">自我进化</div>
                    <div class="feature-desc">觉察→自省→无我→彼岸→般若→圣人</div>
                </div>
            </div>
        </div>
    `;
}

// ============================================================
// Send Message
// ============================================================
async function sendMessage() {
    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if (!text || isStreaming) return;

    // Add user message immediately
    appendMessage("user", text);
    input.value = "";
    input.style.height = "auto";
    scrollToBottom();

    // Show typing indicator
    const typingId = showTyping();
    isStreaming = true;
    document.getElementById("sendBtn").disabled = true;

    try {
        const provider = document.getElementById("providerSelect").value || selectedProvider;
        const r = await fetch(`/api/sessions/${currentSessionId}/chat`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: text, provider }),
        });

        const data = await r.json();
        removeTyping(typingId);

        if (data.error) {
            appendMessage("assistant", "⚠️ " + data.error);
            return;
        }

        // Update cognitive panel
        if (data.cognitive && showCognitive) {
            updateCognitivePanel(data.cognitive);
        }

        // Check if crisis
        if (data.type === "crisis_intervention") {
            appendMessage("assistant", data.content, {}, true);
        } else if (r.headers.get("content-type")?.includes("text/event-stream")) {
            // Streaming response
            const reader = r.body.getReader();
            const decoder = new TextDecoder();
            const msgDiv = createMessageDiv("assistant");
            document.getElementById("messagesArea").appendChild(msgDiv);
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split("\n");
                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        try {
                            const obj = JSON.parse(line.slice(6));
                            if (obj.chunk) {
                                fullText += obj.chunk;
                                msgDiv.querySelector(".message-content").innerHTML = formatMarkdown(fullText);
                                scrollToBottom();
                            }
                        } catch (e) {}
                    }
                }
            }

            // Final cognitive update from streamed data
            if (data.cognitive && showCognitive) {
                updateCognitivePanel(data.cognitive);
            }
        } else {
            appendMessage("assistant", data.content);
        }
    } catch (e) {
        removeTyping(typingId);
        appendMessage("assistant", "⚠️ 请求失败: " + e.message);
    }

    isStreaming = false;
    document.getElementById("sendBtn").disabled = false;
    input.focus();
    await loadSessions();
}

// ============================================================
// Helpers
// ============================================================
function appendMessage(role, content, metadata = {}, crisis = false) {
    const area = document.getElementById("messagesArea");
    const div = createMessageDiv(role, crisis);
    div.querySelector(".message-content").innerHTML = formatMarkdown(content);
    area.appendChild(div);
    scrollToBottom();
    return div;
}

function createMessageDiv(role, crisis = false) {
    const div = document.createElement("div");
    div.className = `message message-${role}`;
    if (crisis) div.className += " crisis-message";
    if (role === "assistant") {
        div.innerHTML = `
            <div class="message-avatar">🐛</div>
            <div>
                <div class="message-content"></div>
            </div>
        `;
    } else {
        div.innerHTML = `<div class="message-content"></div>`;
    }
    return div;
}

function showTyping() {
    const id = "typing-" + Date.now();
    const area = document.getElementById("messagesArea");
    const div = document.createElement("div");
    div.className = "message message-assistant";
    div.id = id;
    div.innerHTML = `
        <div class="message-avatar">🐛</div>
        <div class="message-content">
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        </div>
    `;
    area.appendChild(div);
    scrollToBottom();
    return id;
}

function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

function scrollToBottom() {
    const area = document.getElementById("messagesArea");
    area.scrollTop = area.scrollHeight;
}

function handleKeydown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 200) + "px";
}

// ============================================================
// Cognitive Panel
// ============================================================
function toggleCognitive() {
    showCognitive = !showCognitive;
    const panel = document.getElementById("cognitivePanel");
    const btn = document.getElementById("cognitiveToggle");
    if (showCognitive) {
        panel.classList.add("visible");
        btn.textContent = "🧠 隐藏分析";
    } else {
        panel.classList.remove("visible");
        btn.textContent = "🧠 认知分析";
    }
}

function updateCognitivePanel(cog) {
    if (!cog) return;
    const tgb = cog.tgb || {};
    const emotion = cog.emotion || {};
    const consciousness = cog.consciousness || {};
    const selfEvolution = cog.self_evolution || {};

    document.getElementById("tgbVerdict").textContent = tgb.verdict || "—";
    document.getElementById("tgbBar").style.width = ((tgb.overall || 0) * 100) + "%";

    document.getElementById("emotionValue").textContent = emotion.primary_emotion || "—";
    document.getElementById("emotionBar").style.width = ((Math.abs(emotion.valence || 0) + Math.abs(emotion.arousal || 0)) / 2 * 100) + "%";

    document.getElementById("consciousnessValue").textContent = consciousness.consciousness_state || "—";
    document.getElementById("consciousnessBar").style.width = ((consciousness.phi_score || 0) * 100) + "%";

    document.getElementById("selfLevelValue").textContent = selfEvolution.level_name || "觉察";
}

// ============================================================
// Sessions
// ============================================================
async function newSession() {
    try {
        const r = await fetch("/api/sessions", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ title: "新对话" }),
        });
        const s = await r.json();
        currentSessionId = s.id;
        document.getElementById("messagesArea").innerHTML = "";
        showWelcome();
        loadSessions();
        history.pushState({}, "", `?session=${s.id}`);
    } catch (e) { console.error(e); }
}

async function switchSession(id) {
    currentSessionId = id;
    await loadMessages();
    loadSessions();
    history.pushState({}, "", `?session=${id}`);
}

async function clearChat() {
    if (!confirm("确定清空当前对话？")) return;
    if (currentSessionId) {
        await fetch(`/api/sessions/${currentSessionId}`, { method: "DELETE" });
    }
    document.getElementById("messagesArea").innerHTML = "";
    showWelcome();
    loadSessions();
}

function setProvider(p) {
    selectedProvider = p;
}

// ============================================================
// Formatting
// ============================================================
function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

function formatMarkdown(text) {
    if (!text) return "";
    // Escape HTML first
    let html = escapeHtml(text);
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    // Italic
    html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
    // Code blocks
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, "<pre><code>$2</code></pre>");
    // Inline code
    html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
    // Line breaks
    html = html.replace(/\n/g, "<br>");
    return html;
}

function formatDate(iso) {
    if (!iso) return "";
    try {
        const d = new Date(iso);
        return d.toLocaleDateString("zh-CN", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    } catch { return ""; }
}
